name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to deploy (default: latest main)"
        required: false
        default: ""

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false  # never abort a half-finished deploy

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}
      sha: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.sha }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Pick image to deploy
        id: image
        run: |
          # Prefer the SHA tag (immutable) over `latest`.
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${GITHUB_SHA}"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Configure SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          set -euo pipefail
          if [[ -z "${VPS_HOST}" ]]; then echo "::error::Secret VPS_HOST is empty — add it under Settings → Secrets (or environment production)"; exit 1; fi
          if [[ -z "${VPS_USER}" ]]; then echo "::error::Secret VPS_USER is empty"; exit 1; fi
          if [[ -z "${VPS_SSH_KEY}" ]]; then echo "::error::Secret VPS_SSH_KEY is empty"; exit 1; fi
          install -m 0700 -d ~/.ssh
          # printf preserves PEM newlines; echo can break OpenSSH parsing for some keys
          printf '%s\n' "${VPS_SSH_KEY}" > ~/.ssh/ci_deploy_key
          chmod 600 ~/.ssh/ci_deploy_key
          ssh-keyscan -H "${VPS_HOST}" >> ~/.ssh/known_hosts

      - name: Copy deployment manifest
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          set -euo pipefail
          scp -i ~/.ssh/ci_deploy_key \
              deploy/docker-compose.prod.yml \
              deploy/health-check.sh \
              deploy/rollback.sh \
              deploy/deploy.sh \
              "${VPS_USER}@${VPS_HOST}:/opt/crypto-options-bot/"

      - name: Deploy on VPS
        id: deploy
        env:
          IMAGE: ${{ steps.image.outputs.image }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/ci_deploy_key \
              "${VPS_USER}@${VPS_HOST}" \
              "sudo IMAGE=$IMAGE bash /opt/crypto-options-bot/deploy.sh"

      - name: Health check (with auto-rollback)
        env:
          IMAGE: ${{ steps.image.outputs.image }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          set -euo pipefail
          if ! ssh -i ~/.ssh/ci_deploy_key \
                   "${VPS_USER}@${VPS_HOST}" \
                   "sudo bash /opt/crypto-options-bot/health-check.sh"; then
            echo "Health check failed; rolling back."
            ssh -i ~/.ssh/ci_deploy_key \
                "${VPS_USER}@${VPS_HOST}" \
                "sudo bash /opt/crypto-options-bot/rollback.sh"
            exit 1
          fi
