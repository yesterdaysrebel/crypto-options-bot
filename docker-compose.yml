services:
  bot:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    image: crypto-options-bot:local
    container_name: crypto-options-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
      - ./journals:/app/journals
      - ./logs:/app/logs
      - ./config:/app/config:ro
    ports:
      - "127.0.0.1:9091:9091"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9091/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
